<!DOCTYPE html>
<html>
<head>
    <title>Mot de passe oublié</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f4f8; max-width: 400px; margin: 100px auto; }
        h1 { color: #2d3748; text-align: center; }
        input { width: 100%; padding: 10px; margin: 8px 0; font-size: 16px; border: none; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #48bb78; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .message { color: #48bb78; text-align: center; }
        .erreur { color: #fc8181; text-align: center; }
        .lien { text-align: center; margin-top: 15px; }
        a { color: #48bb78; }
    </style>
    <link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#48bb78">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MyFamilyList">
<link rel="apple-touch-icon" href="/static/icon-192.png">
</head>
<body>
    <h1>🔑 Mot de passe oublié</h1>
    {% if message %}<p class="message">{{ message }}</p>{% endif %}
    {% if erreur %}<p class="erreur">{{ erreur }}</p>{% endif %}
    <form method="POST">
        <input type="email" name="email" placeholder="Votre adresse email">
        <button type="submit">Envoyer le lien de réinitialisation</button>
    </form>
    <div class="lien"><a href="/connexion">← Retour à la connexion</a></div>
</body>
</html>

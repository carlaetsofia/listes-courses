<!DOCTYPE html>
<html>
<head>
    <title>Connexion</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f4f8; max-width: 400px; margin: 100px auto; }
        h1 { color: #2d3748; text-align: center; }
        input { width: 100%; padding: 10px; margin: 8px 0; font-size: 16px; border: none; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #48bb78; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .erreur { color: #fc8181; text-align: center; }
        .lien { text-align: center; margin-top: 15px; }
        a { color: #48bb78; }
    </style>
</head>
<body>
    <h1>🔐 Connexion</h1>
    {% if erreur %}<p class="erreur">{{ erreur }}</p>{% endif %}
    <form method="POST">
        <input type="text" name="pseudo" placeholder="Votre pseudo">
        <input type="password" name="mot_de_passe" placeholder="Votre mot de passe">
        <button type="submit">Se connecter</button>
    </form>
    <div class="lien"><a href="/inscription">Pas encore de compte ? S'inscrire</a></div>
</body>
</html>
